<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLBC Operations Hub — Oak Leaf Bourbon Club</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAF7F2;--s1:#FFFFFF;--s2:#F5F0E8;--s3:#EDE6D8;
--b1:#D4C5A0;--b2:#C4B48A;
--brown:#3D2B1F;--brown2:#5C3D2E;--brown3:#7A5C4F;
--gold:#B8860B;--gold2:#DAA520;--gold-bg:rgba(184,134,11,0.08);
--cream:#FDF6E3;--cream2:#FAF0D7;
--green:#2D6A4F;--green-bg:rgba(45,106,79,0.08);
--red:#9B2226;--red-bg:rgba(155,34,38,0.08);
--blue:#1B4965;--blue-bg:rgba(27,73,101,0.08);
--purple:#5A189A;--purple-bg:rgba(90,24,154,0.08);
--t1:#2C2C2C;--t2:#5C5C5C;--t3:#8C8C8C;--t4:#AAAAAA;
--display:'Playfair Display',Georgia,serif;
--sans:'DM Sans',-apple-system,sans-serif;
--mono:'JetBrains Mono',monospace;
--r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);display:flex}

/* Sidebar */
.side{width:260px;height:100vh;background:var(--brown);display:flex;flex-direction:column;flex-shrink:0}
.side-logo{padding:20px 22px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-family:var(--display);font-size:15px;font-weight:600;color:#FDF6E3;letter-spacing:0.5px}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;font-style:italic}
.side-user{padding:14px 22px;border-bottom:1px solid rgba(255,255,255,0.06)}
.user-name{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8)}
.user-role{font-size:10px;color:var(--gold2);margin-top:2px;font-family:var(--mono)}
.side-nav{flex:1;overflow-y:auto;padding:8px 0}
.side-nav::-webkit-scrollbar{width:3px}
.side-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.nav-sec{padding:16px 22px 6px;font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.25);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 22px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;transition:all 0.12s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.75)}
.nav-item.active{background:rgba(184,134,11,0.15);color:var(--gold2);font-weight:500;border-left-color:var(--gold)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.nav-badge{margin-left:auto;font-size:9px;font-family:var(--mono);padding:1px 6px;border-radius:10px;font-weight:600;background:rgba(184,134,11,0.25);color:var(--gold2)}
.nav-lock{margin-left:auto;font-size:10px;opacity:0.3}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-title{font-family:var(--display);font-size:18px;font-weight:600;color:var(--brown);flex:1}
.topbar-crumb{font-size:11px;color:var(--t3)}
.topbar-user{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--sans)}

.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* Cards */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:20px;margin-bottom:14px}
.card-title{font-family:var(--display);font-size:16px;font-weight:600;color:var(--brown);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--t3);margin-bottom:14px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}

/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* Metrics */
.metric{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.m-gold::before{background:var(--gold)}.m-green::before{background:var(--green)}.m-blue::before{background:var(--blue)}.m-red::before{background:var(--red)}.m-purple::before{background:var(--purple)}
.m-val{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1;margin-bottom:4px}
.m-gold .m-val{color:var(--gold)}.m-green .m-val{color:var(--green)}.m-blue .m-val{color:var(--blue)}.m-red .m-val{color:var(--red)}.m-purple .m-val{color:var(--purple)}
.m-lbl{font-size:12px;color:var(--t3)}
.m-sub{font-size:10px;color:var(--t4);margin-top:6px;font-family:var(--mono)}

/* Tables */
table.dt{width:100%;border-collapse:collapse}
table.dt th{text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--t3);font-weight:600;border-bottom:2px solid var(--b1)}
table.dt td{padding:10px;font-size:13px;color:var(--t1);border-bottom:1px solid var(--b1)}
table.dt tr:hover td{background:var(--s2)}

/* Badges */
.badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;display:inline-block}
.b-gold{background:var(--gold-bg);color:var(--gold)}.b-green{background:var(--green-bg);color:var(--green)}.b-red{background:var(--red-bg);color:var(--red)}.b-blue{background:var(--blue-bg);color:var(--blue)}.b-purple{background:var(--purple-bg);color:var(--purple)}.b-gray{background:var(--s2);color:var(--t3)}

/* Buttons */
.btn{padding:7px 16px;border-radius:var(--r-sm);border:none;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer}
.btn-p{background:var(--gold);color:#fff}.btn-s{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}

/* Timeline */
.tl{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)}.tl:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-title{font-size:13px;font-weight:500}.tl-sub{font-size:11px;color:var(--t3);margin-top:2px}.tl-time{font-size:10px;color:var(--t4);font-family:var(--mono);margin-top:2px}

/* People cards */
.person{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;text-align:center}
.person-avatar{width:48px;height:48px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#fff}
.person-name{font-size:13px;font-weight:600;color:var(--brown)}
.person-role{font-size:11px;color:var(--gold);margin-top:2px}

/* Committee cards */
.comm-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;cursor:pointer;transition:all 0.15s}
.comm-card:hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(184,134,11,0.1)}
.comm-icon{font-size:24px;margin-bottom:8px}
.comm-name{font-size:13px;font-weight:600;color:var(--brown)}
.comm-chair{font-size:11px;color:var(--t3);margin-top:4px}
.comm-count{font-size:10px;color:var(--t4);margin-top:2px;font-family:var(--mono)}

/* Empty state */
.empty{text-align:center;padding:32px;color:var(--t3)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:0.3}

/* Access indicator */
.access-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--cream);border:1px solid var(--b1);border-radius:var(--r-sm);margin-bottom:14px;font-size:11px;color:var(--brown3)}
.access-dot{width:6px;height:6px;border-radius:50%}
</style>
</head>
<body>

<div class="side">
  <div class="side-logo">
    <div class="logo-mark">
      <div class="logo-icon">🥃</div>
      <div>
        <div class="logo-text">Oak Leaf Bourbon Club</div>
        <div class="logo-sub">Pouring Into the Next Generation</div>
      </div>
    </div>
  </div>
  <div class="side-user">
    <div class="user-name" id="user-display">Edward Colvin</div>
    <div class="user-role" id="role-display">PRESIDENT</div>
  </div>
  <div class="side-nav" id="nav"></div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="topbar-crumb" id="access-level"></div>
    <div class="topbar-user">
      <div class="avatar" id="avatar-display">EC</div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// USERS & ROLES
// ═══════════════════════════════════════════════════════════
const USERS = {
  'edward': { name: 'Edward Colvin', initials: 'EC', role: 'president', title: 'President', access: ['all'], bg: '#B8860B' },
  'rawleigh': { name: 'Rawleigh Williams', initials: 'RW', role: 'vp', title: 'Vice President', access: ['officer','board','community'], bg: '#2D6A4F' },
  'michael': { name: 'Michael Meyers', initials: 'MM', role: 'treasurer', title: 'Treasurer', access: ['officer','board','fundraising'], bg: '#1B4965' },
  'brian': { name: 'Brian Smith', initials: 'BS', role: 'secretary', title: 'Administrative Secretary', access: ['officer','board','membership'], bg: '#5A189A' },
  'tim': { name: 'Tim Horton', initials: 'TH', role: 'board', title: 'Board Member', access: ['board'], bg: '#7A5C4F' },
  'rhonda': { name: 'Rhonda Williams', initials: 'RhW', role: 'board', title: 'Board Member', access: ['board'], bg: '#9B2226' },
  'donnel': { name: 'Donnel Brundage', initials: 'DB', role: 'board', title: 'Board Member', access: ['board'], bg: '#3D2B1F' },
  'keena': { name: 'Keena Colvin', initials: 'KC', role: 'committee_chair', title: 'Events Committee Chair', access: ['events'], bg: '#DAA520' },
};

const COMMITTEES = [
  { id: 'scholarship', icon: '🎓', name: 'Scholarship & Youth Impact', chair: 'TBD', members: 0, color: '#2D6A4F' },
  { id: 'fundraising', icon: '💰', name: 'Fundraising & Development', chair: 'TBD', members: 0, color: '#B8860B' },
  { id: 'events', icon: '🎉', name: 'Events & Programming', chair: 'Keena Colvin', members: 1, color: '#DAA520' },
  { id: 'community', icon: '🤝', name: 'Community Outreach & Partnerships', chair: 'TBD', members: 0, color: '#1B4965' },
  { id: 'membership', icon: '👥', name: 'Membership & Fellowship', chair: 'TBD', members: 0, color: '#5A189A' },
  { id: 'marketing', icon: '📢', name: 'Marketing, Comms & Branding', chair: 'TBD', members: 0, color: '#9B2226' },
  { id: 'veterans', icon: '🎖️', name: 'Veterans & Service', chair: 'TBD', members: 0, color: '#3D2B1F' },
];

let currentUser = 'edward';
let currentPage = 'dashboard';

function hasAccess(page) {
  const u = USERS[currentUser];
  if (u.access.includes('all')) return true;
  if (page === 'dashboard') return true;
  if (page === 'announcements') return true;
  if (page === 'calendar') return true;
  if (page === 'documents-shared') return true;
  if (page.startsWith('officer') && ['president','vp','treasurer','secretary'].includes(u.role)) return true;
  if (page === 'board' && (u.access.includes('board') || ['president','vp','treasurer','secretary'].includes(u.role))) return true;
  if (page.startsWith('comm-')) {
    const commId = page.replace('comm-', '');
    if (u.access.includes(commId)) return true;
    if (u.role === 'president') return true;
  }
  if (page === 'president' && u.role === 'president') return true;
  if (page === 'vp' && (u.role === 'vp' || u.role === 'president')) return true;
  if (page === 'treasurer' && (u.role === 'treasurer' || u.role === 'president')) return true;
  if (page === 'secretary' && (u.role === 'secretary' || u.role === 'president')) return true;
  if (page === 'financials' && ['treasurer','president'].includes(u.role)) return true;
  if (page === 'members-mgmt' && ['secretary','president'].includes(u.role)) return true;
  if (page === 'admin' && u.role === 'president') return true;
  return false;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function buildNav() {
  const u = USERS[currentUser];
  const items = [
    { section: 'Common Areas' },
    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
    { id: 'announcements', icon: '📢', label: 'Announcements' },
    { id: 'calendar', icon: '📅', label: 'Club Calendar' },
    { id: 'documents-shared', icon: '📁', label: 'Shared Documents' },

    { section: 'Officer Workspaces' },
    { id: 'president', icon: '👑', label: 'President', lock: !hasAccess('president') },
    { id: 'vp', icon: '🤝', label: 'Vice President', lock: !hasAccess('vp') },
    { id: 'treasurer', icon: '💰', label: 'Treasurer', lock: !hasAccess('treasurer') },
    { id: 'secretary', icon: '📝', label: 'Secretary', lock: !hasAccess('secretary') },

    { section: 'Finance' },
    { id: 'financials', icon: '💵', label: 'Financials', lock: !hasAccess('financials') },

    { section: 'Board of Directors' },
    { id: 'board', icon: '🏛️', label: 'Board Room', lock: !hasAccess('board') },

    { section: 'Committees' },
    ...COMMITTEES.map(c => ({
      id: 'comm-' + c.id, icon: c.icon, label: c.name.split('&')[0].trim(),
      lock: !hasAccess('comm-' + c.id),
      badge: c.chair !== 'TBD' ? null : null
    })),

    { section: 'Administration' },
    { id: 'admin', icon: '⚙️', label: 'Admin & Access', lock: !hasAccess('admin') },
  ];

  document.getElementById('nav').innerHTML = items.map(n => {
    if (n.section) return `<div class="nav-sec">${n.section}</div>`;
    const active = currentPage === n.id ? 'active' : '';
    const lock = n.lock ? `<span class="nav-lock">🔒</span>` : '';
    const badge = n.badge ? `<span class="nav-badge">${n.badge}</span>` : '';
    const click = n.lock ? '' : `onclick="go('${n.id}')"`;
    const opacity = n.lock ? 'opacity:0.35;cursor:not-allowed;' : '';
    return `<div class="nav-item ${active}" ${click} style="${opacity}"><span class="nav-icon">${n.icon}</span>${n.label}${badge}${lock}</div>`;
  }).join('');

  document.getElementById('user-display').textContent = u.name;
  document.getElementById('role-display').textContent = u.title.toUpperCase();
  document.getElementById('avatar-display').textContent = u.initials;
  document.getElementById('avatar-display').style.background = u.bg;
}

function go(page) {
  if (!hasAccess(page)) return;
  currentPage = page;
  buildNav();
  const navItem = COMMITTEES.find(c => 'comm-' + c.id === page);
  document.getElementById('page-title').textContent = getPageTitle(page);
  render();
}

function getPageTitle(page) {
  const titles = {
    dashboard: 'Dashboard', announcements: 'Announcements', calendar: 'Club Calendar',
    'documents-shared': 'Shared Documents', president: 'President\'s Office',
    vp: 'Vice President\'s Office', treasurer: 'Treasurer\'s Office',
    secretary: 'Secretary\'s Office', financials: 'Financial Management',
    board: 'Board Room', admin: 'Administration & Access Control',
    'members-mgmt': 'Membership Management',
  };
  if (page.startsWith('comm-')) {
    const c = COMMITTEES.find(x => 'comm-' + x.id === page);
    return c ? c.name : 'Committee';
  }
  return titles[page] || 'Dashboard';
}

function switchUser(userId) {
  currentUser = userId;
  currentPage = 'dashboard';
  buildNav();
  render();
}

// ═══════════════════════════════════════════════════════════
// PAGE RENDERERS
// ═══════════════════════════════════════════════════════════
function render() {
  const el = document.getElementById('content');
  const u = USERS[currentUser];

  // Access level indicator
  const accessText = u.role === 'president' ? 'Full Access — All Areas' :
    ['vp','treasurer','secretary'].includes(u.role) ? 'Officer Access — Common + Officer + Board Areas' :
    u.role === 'board' ? 'Board Access — Common + Board Room' :
    'Committee Access — Common + Assigned Committee';
  document.getElementById('access-level').textContent = accessText;

  const R = {
    dashboard: rDashboard, announcements: rAnnouncements, calendar: rCalendar,
    'documents-shared': rSharedDocs, president: rPresident, vp: rVP,
    treasurer: rTreasurer, secretary: rSecretary, financials: rFinancials,
    board: rBoard, admin: rAdmin,
  };
  if (currentPage.startsWith('comm-')) {
    el.innerHTML = rCommittee(currentPage.replace('comm-', ''));
  } else {
    el.innerHTML = (R[currentPage] || rDashboard)();
  }
}

function accessBar(level, who) {
  const colors = { all: '#2D6A4F', officers: '#B8860B', board: '#1B4965', committee: '#5A189A', president: '#9B2226' };
  return `<div class="access-bar"><div class="access-dot" style="background:${colors[level]||'#888'}"></div><strong>Access:</strong> ${who}</div>`;
}

// ── DASHBOARD ──
function rDashboard() {
  return `
    ${accessBar('all', 'All officers, board members, and committee chairs can view this page')}
    <div class="g4" style="margin-bottom:16px">
      <div class="metric m-gold"><div class="m-val">15</div><div class="m-lbl">Active Members</div></div>
      <div class="metric m-green"><div class="m-val">7</div><div class="m-lbl">Committees</div><div class="m-sub">1 active · 6 forming</div></div>
      <div class="metric m-blue"><div class="m-val">$0</div><div class="m-lbl">Treasury Balance</div><div class="m-sub">See Treasurer for details</div></div>
      <div class="metric m-purple"><div class="m-val">221</div><div class="m-lbl">Days to Christmas Gala</div><div class="m-sub">December 12, 2026</div></div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-title">Leadership Team</div>
        <div class="card-sub">Officers and Board of Directors</div>
        <div class="g4" style="margin-bottom:12px">
          ${['edward','rawleigh','michael','brian'].map(id => {
            const u = USERS[id];
            return `<div class="person"><div class="person-avatar" style="background:${u.bg}">${u.initials}</div><div class="person-name">${u.name}</div><div class="person-role">${u.title}</div></div>`;
          }).join('')}
        </div>
        <div style="font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:600">Board Members</div>
        <div class="g3">
          ${['tim','rhonda','donnel'].map(id => {
            const u = USERS[id];
            return `<div class="person"><div class="person-avatar" style="background:${u.bg}">${u.initials}</div><div class="person-name">${u.name}</div><div class="person-role">${u.title}</div></div>`;
          }).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-title">Upcoming Events & Deadlines</div>
        <div class="card-sub">Club calendar highlights</div>
        <div class="tl"><div class="tl-dot" style="background:var(--gold)"></div><div><div class="tl-title">Monthly General Meeting</div><div class="tl-sub">Regular membership meeting</div><div class="tl-time">June 7, 2026</div></div></div>
        <div class="tl"><div class="tl-dot" style="background:var(--green)"></div><div><div class="tl-title">Interfaith Dallas Volunteer Day</div><div class="tl-sub">Community partnership event</div><div class="tl-time">June 14, 2026</div></div></div>
        <div class="tl"><div class="tl-dot" style="background:var(--blue)"></div><div><div class="tl-title">Scholarship Application Deadline</div><div class="tl-sub">2026 scholarship cycle closes</div><div class="tl-time">August 1, 2026</div></div></div>
        <div class="tl"><div class="tl-dot" style="background:var(--red)"></div><div><div class="tl-title">Christmas Gala</div><div class="tl-sub">Annual fundraising gala</div><div class="tl-time">December 12, 2026</div></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Committees</div>
      <div class="card-sub">7 committees powering our mission — click any committee you have access to</div>
      <div class="g4" style="grid-template-columns:repeat(4,1fr)">
        ${COMMITTEES.map(c => {
          const accessible = hasAccess('comm-' + c.id);
          return `<div class="comm-card" style="${accessible?'':'opacity:0.4;cursor:not-allowed'}" ${accessible?`onclick="go('comm-${c.id}')"`:''}>
            <div class="comm-icon">${c.icon}</div>
            <div class="comm-name">${c.name}</div>
            <div class="comm-chair">Chair: ${c.chair}</div>
            <div class="comm-count">${c.members} member${c.members!==1?'s':''} ${accessible?'':'🔒'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card" style="margin-top:8px">
      <div class="card-title" style="font-size:12px;color:var(--t3)">🔀 Switch User (Demo Only — shows segregation of duties)</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
        ${Object.entries(USERS).map(([id, u]) =>

// ── COMMITTEE PAGE (generic for all 7) ──
function rCommittee(commId) {
  const c = COMMITTEES.find(x => x.id === commId);

  const responsibilities = {
    scholarship: ['Develop scholarship criteria and application processes','Review scholarship applications','Recommend scholarship recipients to the board','Coordinate mentorship opportunities','Build relationships with schools, counselors, and youth programs','Track scholarship impact and student progress','Ensure fairness, transparency, and mission alignment'],
    fundraising: ['Plan and execute fundraising campaigns','Identify potential donors, sponsors, and partners','Draft sponsorship proposals','Manage donor relations and appreciation','Track fundraising progress','Support scholarship fundraising goals','Collaborate with Events Committee on fundraising events'],
    events: ['Plan monthly meetings and special events','Coordinate logistics (venue, vendors, décor, supplies)','Ensure events align with mission and fundraising goals','Work with Fundraising Committee on sponsorships','Manage event volunteers','Create event timelines and checklists'],
    community: ['Engage local businesses, distilleries, and civic groups','Represent OLBC at community events','Build partnerships with schools and youth organizations','Coordinate volunteer opportunities','Promote OLBC\'s mission in the community','Strengthen OLBC\'s reputation as a community pillar'],
    membership: ['Manage new member onboarding','Create a welcoming environment at meetings','Track membership status and engagement','Plan fellowship activities','Support member appreciation efforts'],
    marketing: ['Manage social media accounts','Create flyers, announcements, and promotional materials','Maintain website updates','Document events (photos, videos, recaps)','Promote fundraising campaigns','Ensure consistent branding and messaging','Support outreach and recruitment efforts'],
    veterans: ['Coordinate veteran-focused service projects','Build relationships with veteran organizations','Support veteran members within OLBC','Promote veteran appreciation initiatives'],
  };

  const resps = responsibilities[commId] || [];
  const isChair = (commId === 'events' && currentUser === 'keena') || USERS[currentUser].role === 'president';

  return `
    ${accessBar('committee', `Committee Chair + President only · Chair: ${c.chair} · ${isChair ? 'You have edit access' : 'Read-only access'}`)}
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${c.icon} ${c.name}</div>
          <div class="card-sub">Chair: ${c.chair} · ${c.members} member${c.members!==1?'s':''}</div>
        </div>
        ${isChair ? '<button class="btn btn-p">+ Add Member</button>' : ''}
      </div>
      <div class="g2">
        <div>
          <h3 style="font-family:var(--display);font-size:14px;color:var(--brown);margin-bottom:8px">Committee Responsibilities</h3>
          ${resps.map(r => `<div style="display:flex;gap:8px;padding:4px 0"><span style="color:var(--gold)">•</span><span style="font-size:12px;color:var(--t2)">${r}</span></div>`).join('')}
        </div>
        <div>
          <h3 style="font-family:var(--display);font-size:14px;color:var(--brown);margin-bottom:8px">Committee Members</h3>
          ${c.chair !== 'TBD' ?
            `<div class="person" style="margin-bottom:8px"><div class="person-avatar" style="background:${c.color}">${c.chair.split(' ').map(n=>n[0]).join('')}</div><div class="person-name">${c.chair}</div><div class="person-role">Committee Chair</div></div>` :
            `<div class="empty"><div class="empty-icon">👤</div><div style="font-size:12px">No chair assigned yet</div><div style="font-size:11px;color:var(--t4);margin-top:4px">Contact President Colvin to volunteer</div></div>`
          }
          <h3 style="font-family:var(--display);font-size:14px;color:var(--brown);margin:16px 0 8px">Committee Documents</h3>
          <div class="empty"><div class="empty-icon">📁</div><div style="font-size:12px">No documents uploaded yet</div>
          ${isChair ? '<button class="btn btn-p" style="margin-top:8px">Upload Document</button>' : ''}</div>

          <h3 style="font-family:var(--display);font-size:14px;color:var(--brown);margin:16px 0 8px">Action Items</h3>
